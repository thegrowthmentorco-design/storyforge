name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        # M0.1.4 — coverage report on stdout for visibility. No --cov-fail-under
        # yet; we'll set a threshold once we have a baseline measurement of
        # what's reasonable for the extract / services modules.
        run: pytest -v --cov=services --cov=routers --cov=extract --cov-report=term-missing

  frontend:
    name: frontend (vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run tests
        # M0.1.2 — Vitest. Same Clerk-key placeholder rule as the build:
        # the test setup file shouldn't read it, but if any imported module
        # does at import time, we need it non-empty.
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder_key
        run: npm test

      - name: Build
        env:
          # CI build only needs to succeed; Clerk key is a public publishable
          # key, so a placeholder is fine — runtime instances inject the real
          # one. Just needs to be non-empty so Vite doesn't crash on a missing
          # required env var.
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder_key
        run: npm run build

  e2e:
    # M0.1.3 — Playwright e2e. Separate job so Vitest + build can pass even
    # if the browser specs go red (they're newer + flakier). Currently 2
    # smoke specs hitting public unauth surfaces; the full upload→extract
    # path needs Clerk auth bypass plumbing in the backend (M0.1.3.b).
    name: e2e (playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        # The Chromium download is ~140 MB; caching keeps subsequent runs fast.
        # Key includes the package-lock.json hash so a Playwright bump triggers
        # a fresh download.
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        env:
          # webServer.env in playwright.config.js sets this for the spawned
          # dev server, but the test process itself reads VITE_* through Vite,
          # which doesn't apply at runtime. Belt + braces here.
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_e2e_placeholder_key_dGVzdA
        run: npm run e2e

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: frontend/test-results/
          retention-days: 7
